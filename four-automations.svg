<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">The 4 Devin Automations</title>
  <desc id="desc">A four-step CVE auto-remediation pipeline that scans, fixes, reviews, merges, and repeats automatically.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <style>
      text {
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
      .phase {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .name {
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .trigger {
        font-size: 15px;
        font-weight: 700;
      }
      .body {
        font-size: 17px;
        fill: #475569;
      }
      .badge {
        font-size: 24px;
        font-weight: 700;
        fill: #ffffff;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="760" rx="28" fill="#ffffff"/>

  <text x="800" y="62" text-anchor="middle" font-size="40" font-weight="700" fill="#0f172a">
    The 4 Devin Automations
  </text>
  <text x="800" y="99" text-anchor="middle" font-size="20" fill="#64748b">
    A CVE is found, fixed, and merged — automatically.
  </text>

  <text x="414" y="151" text-anchor="middle" class="phase" fill="#0369a1">DETECT</text>
  <line x1="329" y1="160" x2="499" y2="160" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>

  <text x="993" y="151" text-anchor="middle" class="phase" fill="#b45309">FIX</text>
  <line x1="953" y1="160" x2="1033" y2="160" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>

  <text x="1378" y="151" text-anchor="middle" class="phase" fill="#15803d">MERGE</text>
  <line x1="1328" y1="160" x2="1428" y2="160" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>

  <path d="M390 378 H425" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <path d="M775 378 H810" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <path d="M1160 378 H1195" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <g filter="url(#shadow)">
    <rect x="55" y="180" width="335" height="400" rx="24" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  </g>
  <circle cx="105" cy="230" r="29" fill="#0369a1"/>
  <text x="105" y="238" class="badge">1</text>
  <text x="222.5" y="300" text-anchor="middle" font-size="58">🗓️</text>
  <text x="222.5" y="350" text-anchor="middle" class="name">Advisory Scan</text>
  <rect x="159" y="374" width="127" height="34" rx="17" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="222.5" y="396" text-anchor="middle" class="trigger" fill="#0369a1">Every day</text>
  <text x="222.5" y="456" text-anchor="middle" class="body">
    <tspan x="222.5" dy="0">Scans dependencies, files a</tspan>
    <tspan x="222.5" dy="26">GitHub issue for each new CVE</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="440" y="180" width="335" height="400" rx="24" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  </g>
  <circle cx="490" cy="230" r="29" fill="#0369a1"/>
  <text x="490" y="238" class="badge">2</text>
  <text x="607.5" y="300" text-anchor="middle" font-size="58">📌</text>
  <text x="607.5" y="350" text-anchor="middle" class="name">Vulnerability Scan</text>
  <rect x="536" y="374" width="143" height="34" rx="17" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="607.5" y="396" text-anchor="middle" class="trigger" fill="#0369a1">On every push</text>
  <text x="607.5" y="456" text-anchor="middle" class="body">
    <tspan x="607.5" dy="0">Same scan, but runs whenever</tspan>
    <tspan x="607.5" dy="26">code is pushed</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="825" y="180" width="335" height="400" rx="24" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  </g>
  <circle cx="875" cy="230" r="29" fill="#b45309"/>
  <text x="875" y="238" class="badge">3</text>
  <text x="992.5" y="300" text-anchor="middle" font-size="58">🤖</text>
  <text x="992.5" y="350" text-anchor="middle" class="name">Issue → Fix</text>
  <rect x="928" y="374" width="129" height="34" rx="17" fill="#ffffff" stroke="#fbbf24"/>
  <text x="992.5" y="396" text-anchor="middle" class="trigger" fill="#b45309">Issue opened</text>
  <text x="992.5" y="456" text-anchor="middle" class="body">
    <tspan x="992.5" dy="0">Devin upgrades the package</tspan>
    <tspan x="992.5" dy="26">and opens a pull request</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="1210" y="180" width="335" height="400" rx="24" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  </g>
  <circle cx="1260" cy="230" r="29" fill="#15803d"/>
  <text x="1260" y="238" class="badge">4</text>
  <text x="1377.5" y="300" text-anchor="middle" font-size="58">✅</text>
  <text x="1377.5" y="350" text-anchor="middle" class="name">Review &amp; Merge</text>
  <rect x="1321" y="374" width="113" height="34" rx="17" fill="#ffffff" stroke="#4ade80"/>
  <text x="1377.5" y="396" text-anchor="middle" class="trigger" fill="#15803d">PR opened</text>
  <text x="1377.5" y="443" text-anchor="middle" class="body">
    <tspan x="1377.5" dy="0">Checks it's safe, waits for the</tspan>
    <tspan x="1377.5" dy="26">green check, merges it</tspan>
  </text>

  <path d="M1378 580 C1378 648 1280 672 1110 672 H490 C320 672 222 648 222 595"
        fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="8 9" marker-end="url(#arrowhead)"/>
  <rect x="724" y="650" width="152" height="40" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="800" y="676" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b">
    loops forever
  </text>

  <text x="800" y="730" text-anchor="middle" font-size="18" fill="#64748b">
    No human needed on the happy path.
  </text>
</svg>